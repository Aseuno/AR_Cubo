<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Cubo DATi</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:#111;
font-family:Arial;
}

model-viewer{
width:100vw;
height:100vh;
}

</style>

</head>

<body>

<model-viewer
src="cubo.glb"
ar
ar-placement="wall"
shadow-intensity="1"
ar camera-controls
touch-action="pan-y"
auto-rotate>

 <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; ">
      👋 Activate AR
  </button>

</model-viewer>

</body>

</html>
