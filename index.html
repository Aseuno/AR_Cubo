<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Cubo DATi</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:#111;
font-family:Arial;
overflow:hidden;
}

model-viewer{
width:100vw;
height:100vh;
}

#ar-button{
position:absolute;
left:50%;
bottom:25vh;

transform:translateX(-50%);

padding:30px 60px;

font-size:clamp(18px,2.5vw,24px);

background:white;
border:none;
border-radius:16px;

box-shadow:0 6px 14px rgba(0,0,0,0.35);

cursor:pointer;

z-index:10;

}

</style>

</head>

<body>

<model-viewer
src="cubo.glb"
ar
ar-placement="floor"
scale="1.4 1.4 1.4"
shadow-intensity=".5"
camera-controls
interaction-prompt="auto"
touch-action="pan-y"
touch-action="pan-x">

 <button slot="ar-button" id="ar-button">
  Ver en AR
  </button>

</model-viewer>

</body>

</html>
