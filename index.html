<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Cubo DATi</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:#111;
font-family:Arial;
}

model-viewer{
width:100vw;
height:100vh;
}

</style>

</head>

<body>

<model-viewer
src="cubo.glb"
ar
ar-modes="scene-viewer webxr quick-look"
camera-controls
touch-action="pan-y"
auto-rotate
shadow-intensity="1">

  <button slot="ar-button" id="ar-button">
    View in your space
  </button>

  <div id="ar-prompt">
    <img src="../../assets/hand.png">
  </div>

  <button id="ar-failure">
    AR is not tracking!
  </button>

</model-viewer>

</body>

</html>
